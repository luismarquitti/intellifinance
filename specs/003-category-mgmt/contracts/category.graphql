# GraphQL Schema: Category Management

type Category {
  id: ID!
  user_id: ID!
  name: String!
  type: CategoryType!
  parent_id: ID
  created_at: String!
  updated_at: String!
  parent: Category
  children: [Category!]
}

enum CategoryType {
  EXPENSE
  REVENUE
}

type Query {
  categories: [Category!]!
  category(id: ID!): Category
}

type Mutation {
  createCategory(name: String!, type: CategoryType!, parent_id: ID): Category!
  updateCategory(id: ID!, name: String, type: CategoryType, parent_id: ID): Category!
  deleteCategory(id: ID!): Boolean!
}
